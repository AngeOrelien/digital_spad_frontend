<header class="bg-white border-b border-gray-200 shadow-sm">
    <div class="px-4 sm:px-6 lg:px-8">
        <div class="flex items-center justify-between py-4">
            <!-- Bouton menu mobile -->
            <div class="md:hidden">
                <button id="sidebar-toggle" class="text-gray-500 hover:text-gray-600">
                    <i class="text-xl fas fa-bars"></i>
                </button>
            </div>

            <!-- Recherche -->
            <div class="flex-1 max-w-xs mx-4">
                <div class="relative">
                    <div class="absolute inset-y-0 left-0 flex items-center pl-3 pointer-events-none">
                        <i class="text-gray-400 fas fa-search"></i>
                    </div>
                    <input type="search"
                        class="block w-full py-2 pl-10 pr-3 leading-5 placeholder-gray-500 bg-white border border-gray-300 rounded-md focus:outline-none focus:placeholder-gray-400 focus:ring-1 focus:ring-spad-500 focus:border-spad-500 sm:text-sm"
                        placeholder="Rechercher...">
                </div>
            </div>

            <!-- Actions rapides -->
            <div class="flex items-center space-x-4">
                <!-- Boutons actions rapides -->
                <button
                    class="relative p-2 text-gray-600 transition duration-200 rounded-lg hover:text-spad-600 hover:bg-gray-100">
                    <i class="text-lg fas fa-bell"></i>
                    <span id="notification-count"
                        class="absolute flex items-center justify-center hidden w-5 h-5 text-xs text-white bg-red-500 rounded-full -top-1 -right-1">3</span>
                </button>

                <button
                    class="relative p-2 text-gray-600 transition duration-200 rounded-lg hover:text-spad-600 hover:bg-gray-100">
                    <i class="text-lg fas fa-comment-dots"></i>
                    <span id="message-count"
                        class="absolute flex items-center justify-center hidden w-5 h-5 text-xs text-white bg-red-500 rounded-full -top-1 -right-1">5</span>
                </button>

                <button
                    class="relative p-2 text-gray-600 transition duration-200 rounded-lg hover:text-spad-600 hover:bg-gray-100">
                    <i class="text-lg fas fa-exclamation-triangle"></i>
                    <span id="alert-count"
                        class="absolute flex items-center justify-center hidden w-5 h-5 text-xs text-white bg-red-500 rounded-full -top-1 -right-1">2</span>
                </button>

                <!-- Menu utilisateur -->
                <div class="relative ml-3" x-data="{ open: false }">
                    <button @click="open = !open"
                        class="flex items-center space-x-2 text-sm rounded-full focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-spad-500">
                        <div
                            class="flex items-center justify-center w-8 h-8 font-bold text-white rounded-full bg-spad-600">
                            {{ utilisateur_nom[0]|upper }}
                        </div>
                        <span class="hidden font-medium text-gray-700 md:block">{{ utilisateur_nom }}</span>
                        <i class="text-gray-400 fas fa-chevron-down"></i>
                    </button>

                    <!-- Dropdown -->
                    <div x-show="open" @click.away="open = false"
                        class="absolute right-0 z-50 w-48 py-1 mt-2 origin-top-right bg-white rounded-md shadow-lg ring-1 ring-black ring-opacity-5 focus:outline-none"
                        style="display: none;">
                        <a href="{{ url_for('profile') }}" class="dropdown-item">
                            <i class="mr-3 fas fa-user-circle"></i>
                            Mon profil
                        </a>
                        <a href="{{ url_for('help_support') }}" class="dropdown-item">
                            <i class="mr-3 fas fa-question-circle"></i>
                            Aide & Support
                        </a>
                        <div class="my-1 border-t border-gray-100"></div>
                        <a href="{{ url_for('logout') }}" class="text-red-600 dropdown-item">
                            <i class="mr-3 fas fa-sign-out-alt"></i>
                            Déconnexion
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</header>

<style>
    .dropdown-item {
        @apply block px-4 py-2 text-sm text-gray-700 hover:bg-gray-100 hover:text-gray-900 transition duration-150;
    }
</style>

<script>
    // Toggle sidebar mobile
    document.getElementById('sidebar-toggle').addEventListener('click', function () {
        const sidebar = document.querySelector('.md\\:hidden > div');
        sidebar.classList.toggle('hidden');
    });

    // Mettre à jour les compteurs
    function updateCounters() {
        // Simulation de données - à remplacer par des appels API réels
        /*fetch('/api/notifications/count')
            .then(response => response.json())
            .then(data => {
                if (data.count > 0) {
                    document.getElementById('notification-count').textContent = data.count;
                    document.getElementById('notification-count').classList.remove('hidden');
                }
            });
        */
        // Simuler des données pour la démo
        setTimeout(() => {
            document.getElementById('notification-count').textContent = '2';
            document.getElementById('notification-count').classList.remove('hidden');

            document.getElementById('message-count').textContent = '3';
            document.getElementById('message-count').classList.remove('hidden');

            document.getElementById('alert-count').textContent = '1';
            document.getElementById('alert-count').classList.remove('hidden');
        }, 1000);
    }

    // Mettre à jour les compteurs au chargement
    document.addEventListener('DOMContentLoaded', updateCounters);
</script>
